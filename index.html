<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熱中症警戒サイネージ(縦型) - 大分上野丘高校</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            /* サイネージ用途のためスクロールバーを非表示 */
            overflow: hidden; 
            width: 250px;
            height: 850px;
        }
        /* ゲージピンのスムーズなアニメーション移動 */
        #gauge-pin {
            transition: bottom 1s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
    </style>
</head>
<body class="w-[250px] h-[850px] flex flex-col transition-colors duration-1000 bg-gray-200 select-none" id="main-bg">
    
    <header class="p-3 bg-slate-950 border-b-2 border-slate-800 text-white shadow-lg text-center z-20">
        <h1 class="text-2xl font-black tracking-wider text-white">
            熱中症予防情報
        </h1>
        <div class="mt-1 flex flex-col items-center gap-0.5">
            <span class="border border-slate-700 bg-slate-900 text-slate-300 font-bold text-[10px] px-2 py-0.5 rounded tracking-wider">
                大分市上野丘
            </span>
            <p class="text-[11px] font-bold text-slate-400">
                大分上野丘高校 周辺
            </p>
        </div>
    </header>

    <main class="flex-grow flex flex-col justify-between items-center p-3 text-center">
        
        <div class="w-full bg-yellow-400 text-slate-900 py-1.5 rounded-xl shadow-md border border-white flex items-center justify-center gap-2">
            <span id="current-time-status" class="text-xl font-black tracking-wider font-mono">--:-- 現在</span>
        </div>

        <div id="alert-badge" class="hidden w-full bg-red-600 text-white text-xs font-black py-1.5 rounded-lg animate-pulse border border-white shadow-md">
            ⚠️ 警戒アラート基準到達
        </div>

        <div id="alert-level-box" class="w-full rounded-2xl p-3 shadow-xl bg-white text-gray-800 border-[6px] border-transparent transition-all duration-700 flex flex-col justify-center items-center gap-1">
            <p class="text-[11px] font-bold opacity-60">現在の警戒レベル</p>
            <h2 id="alert-level-text" class="text-4xl font-black tracking-wider leading-none my-1">取得中...</h2>
            
            <div class="w-full mt-1 bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl py-3 border-2 border-orange-500 flex flex-col items-center shadow-inner">
                <span class="text-xs font-black text-orange-600 tracking-wider">暑さ指数 (WBGT)</span>
                <div class="flex items-baseline gap-1 mt-1 justify-center">
                    <span id="wbgt-value" class="text-7xl font-black text-slate-900 tracking-tighter leading-none">--.-</span>
                    <span class="text-3xl font-black text-slate-600">℃</span>
                </div>
            </div>
        </div>

        <div class="w-full bg-white rounded-2xl p-3 shadow-md flex items-center justify-between gap-2 h-[280px] relative">
            <div class="flex flex-col justify-between h-full text-[10px] font-black text-left w-[115px] select-none leading-none">
                <span class="text-red-600 flex items-center gap-1">■ 危険 (31℃〜)</span>
                <span class="text-orange-500 flex items-center gap-1">■ 厳重警戒 (28℃)</span>
                <span class="text-yellow-500 flex items-center gap-1">■ 警戒 (25℃)</span>
                <span class="text-cyan-500 flex items-center gap-1">■ 注意 (21℃)</span>
                <span class="text-green-500 flex items-center gap-1">■ ほぼ安全</span>
            </div>

            <div class="relative w-8 h-full bg-gray-100 rounded-full border border-gray-200 overflow-visible flex flex-col justify-between">
                <div class="absolute inset-0 rounded-full overflow-hidden" 
                     style="background: linear-gradient(to top, #22c55e 0%, #22c55e 30%, #22d3ee 30%, #22d3ee 50%, #facc15 50%, #facc15 65%, #f97316 65%, #f97316 80%, #dc2626 80%, #dc2626 100%);">
                </div>
                <div id="gauge-pin" class="absolute left-[-12px] bottom-[0%] flex items-center z-10">
                    <div class="w-0 h-0 border-t-8 border-t-transparent border-b-8 border-b-transparent border-l-[12px] border-l-slate-900 drop-shadow"></div>
                    <div class="w-3 h-3 rounded-full bg-slate-900 border border-white shadow-md"></div>
                </div>
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 text-[9px] font-bold text-gray-400">35℃</div>
                <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-[9px] font-bold text-gray-400">15℃</div>
            </div>
        </div>

        <div class="w-full bg-white/90 backdrop-blur-sm rounded-xl p-3 shadow-md border border-black/5 min-h-[72px] flex items-center justify-center">
            <p id="alert-message" class="text-sm font-black text-gray-800 leading-snug">
                気象情報読み込み中...
            </p>
        </div>
    </main>

    <footer class="p-4 bg-slate-950 border-t border-slate-800 text-white text-center z-20">
        <p class="text-[14px] font-bold leading-snug text-slate-200">
            ※本情報は参考値です。活動時は必ず現場でWBGT測定器を用いて実測してください。
        </p>
    </footer>

    <script>
        const LATITUDE = 33.2269;
        const LONGITUDE = 131.6119;
        const FETCH_INTERVAL_MS = 10 * 60 * 1000;

        const elTimeStatus = document.getElementById('current-time-status');
        const elMainBg = document.getElementById('main-bg');
        const elAlertBox = document.getElementById('alert-level-box');
        const elAlertText = document.getElementById('alert-level-text');
        const elAlertMsg = document.getElementById('alert-message');
        const elWbgt = document.getElementById('wbgt-value');
        const elGaugePin = document.getElementById('gauge-pin');
        const elAlertBadge = document.getElementById('alert-badge');

        function updateTimestamp() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            elTimeStatus.textContent = `${hours}:${minutes} 現在`;
        }

        function calculateAccurateWBGT(Ta, RH, SR, WS) {
            const srKw = SR / 1000.0;
            const wbgt = (0.735 * Ta) + (0.0374 * RH) + (0.00292 * Ta * RH) + (7.619 * srKw) - (4.557 * Math.pow(srKw, 2)) - (0.0572 * WS) - 4.064;
            return Math.max(15, Math.min(35, wbgt));
        }

        function updateAlertUI(wbgt) {
            let levelText = "", msgText = "", bgColorClass = "", boxColorClass = "";
            if (wbgt >= 31.0) {
                elAlertBadge.classList.remove('hidden');
                levelText = "危険"; msgText = "運動は原則中止！速やかに涼しい室内へ避難してください。";
                bgColorClass = "bg-red-700"; boxColorClass = "border-red-500 text-red-600";
            } else if (wbgt >= 28.0) {
                levelText = "厳重警戒"; msgText = "すべての運動で十分な休息とこまめな水分・塩分補給を！";
                bgColorClass = "bg-orange-500"; boxColorClass = "border-orange-400 text-orange-600";
            } else if (wbgt >= 25.0) {
                levelText = "警戒"; msgText = "運動時は定期的に休息を取り、積極的に水分を補給。";
                bgColorClass = "bg-yellow-400"; boxColorClass = "border-yellow-400 text-yellow-600";
            } else if (wbgt >= 21.0) {
                levelText = "注意"; msgText = "熱中症の兆候に注意し、適度な水分・塩分の補給を。";
                bgColorClass = "bg-cyan-400"; boxColorClass = "border-cyan-400 text-cyan-600";
            } else {
                levelText = "ほぼ安全"; msgText = "適度な水分補給を行い、通常通りの活動でOKです。";
                bgColorClass = "bg-green-500"; boxColorClass = "border-green-400 text-green-600";
            }

            elAlertText.textContent = levelText;
            elAlertMsg.textContent = msgText;
            elMainBg.className = "w-[250px] h-[850px] flex flex-col transition-colors duration-1000 select-none " + bgColorClass;
            elAlertBox.className = `w-full rounded-2xl p-3 shadow-xl bg-white border-[6px] transition-all duration-700 flex flex-col justify-center items-center gap-1 ${boxColorClass}`;
            
            const percentage = Math.max(0, Math.min(100, ((wbgt - 15.0) / (35.0 - 15.0)) * 100));
            elGaugePin.style.bottom = `calc(${percentage}% - 8px)`;
        }

        async function fetchWeatherData() {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current=temperature_2m,relative_humidity_2m,shortwave_radiation,wind_speed_10m&wind_speed_unit=ms&timezone=Asia%2FTokyo`);
                const data = await response.json();
                const wbgt = calculateAccurateWBGT(data.current.temperature_2m, data.current.relative_humidity_2m, data.current.shortwave_radiation, data.current.wind_speed_10m);
                elWbgt.textContent = wbgt.toFixed(1);
                updateAlertUI(wbgt);
                updateTimestamp();
            } catch (error) {
                elAlertText.textContent = "エラー";
            }
        }

        setInterval(updateTimestamp, 60000);
        setInterval(fetchWeatherData, FETCH_INTERVAL_MS);
        fetchWeatherData();
    </script>
</body>
</html>
